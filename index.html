<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Caderno de resposta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!--Barra de Navegação-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shedow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold">Caderno de resposta</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <form class="d-flex ms-auto" role="search">
                    <input class="form-control me-2" type="search">
                    <button class="btn btn-success">Buscar</button>
                </form>
            </div>
        </div>
    </nav>
    
    <!-- Conteúdo -->
     <div class="container py-4">
       <h2 class="mb-4">Caderno de resposta 2 TDS</h2>
       <div id="cards-container" class="row g-3">
         <!-- JS injeta od cards aqui -->
       </div> 
    </div>

    <!-- Modal único que será preenchido dinamicamente -->
     <div class="modal fade" id="flogaoModal" tabindex="-1">
       <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
           <h5 class="modal-title" id="modalNome"></h5>
           <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
           </div>
           <div class="modal-body" id="modalBody">
            <!-- JS injeta os dados aqui -->
             </div>
             <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
          </div>
        </div>
       </div> 
     </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script type="module" src="./js/main.js"></script>
</body>

</html>
